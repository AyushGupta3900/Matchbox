server:
  port: ${SERVER_PORT:8081}     # 8080 is occupied by another local Docker container

spring:
  application:
    name: matchbox
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/matchbox}
    username: ${DB_USER:matchbox}
    password: ${DB_PASSWORD:localdev}
  jpa:
    hibernate:
      ddl-auto: validate          
    open-in-view: false          
  flyway:
    enabled: true
    locations: classpath:db/migration

matchbox:
  jwt:
    # HS256 requires a secret of at least 32 bytes. Real value comes from JWT_SIGNING_SECRET (doc 09).
    secret: ${JWT_SIGNING_SECRET:dev-only-jwt-secret-change-me-min-32-bytes!!}
    access-ttl: ${JWT_ACCESS_TTL:900}     # seconds

management:
  endpoints:
    web:
      exposure:
        include: health,info     
  endpoint:
    health:
      show-details: when_authorized